# runtime_config.yaml — REFERENCE / TEMPLATE ONLY — NOT LOADED
#
# The live file is data/runtime_config.yaml (on the beigebox_data Docker volume).
# It persists across `docker compose build && up` without any manual steps.
#
# For local (non-Docker) dev runs: edit data/runtime_config.yaml directly.
# This root copy is kept as a template; it is no longer read by the app.
runtime:
  # Override the active default model for this session
  default_model: ""          # e.g. "llama3:8b" — blank = use config.yaml value
  # Embedding classifier borderline threshold tweak
  border_threshold: null     # null = use config.yaml value (default 0.04)
  # Agentic scorer threshold (0.0-1.0)
  agentic_threshold: null    # null = 0.5 default
  # Operator total wall-clock timeout across all iterations (1–999s); overrides config.yaml
  operator_run_timeout: null # null = use config.yaml value (default 600)
  # Force a route for all requests this session (overrides classifier)
  force_route: ""            # "simple" | "complex" | "code" | "large" | "" = off
  # Disable specific tools for this session
  tools_disabled: []         # e.g. ["web_search", "memory"]
  # Extra system prompt injected before every request (blank = none)
  system_prompt_prefix: ""
  # Web UI settings
  web_ui_vi_mode: false      # true = enable vi keybindings in chat/operator inputs
  web_ui_palette: "default"  # "default" | "random" | "dracula" | "gruvbox" | "nord"
  # Log level override for this session
  log_level: ""              # "DEBUG" | "INFO" | "WARNING" | "ERROR" | "" = use config.yaml
  # Voice settings (push-to-talk)
  voice_enabled: false       # true = show mic button in web UI
  voice_hotkey: ""           # optional hotkey for push-to-talk (e.g. "v")
  # Full payload logger — dumps complete LLM context to data/payload.jsonl
  # Sources: proxy, proxy_stream, proxy_stream_response, operator, operator_response
  payload_log_enabled: false # flip to true to capture everything; no restart needed
