apiVersion: apps/v1
kind: Deployment
metadata:
  name: beigebox
  labels:
    app: beigebox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beigebox
  template:
    metadata:
      labels:
        app: beigebox
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: beigebox
          image: ghcr.io/ralabarge/beigebox:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http

          env:
            - name: OLLAMA_HOST
              value: "ollama"   # Service name of the Ollama deployment
            - name: BB_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: beigebox-secrets
                  key: bb_master_key
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: beigebox-secrets
                  key: google_api_key
                  optional: true
            - name: GOOGLE_CSE_ID
              valueFrom:
                secretKeyRef:
                  name: beigebox-secrets
                  key: google_cse_id
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: beigebox-secrets
                  key: openrouter_api_key
                  optional: true

          volumeMounts:
            - name: beigebox-data
              mountPath: /app/data
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: runtime-config
              mountPath: /app/runtime_config.yaml
              subPath: runtime_config.yaml
              readOnly: true
            - name: workspace-in
              mountPath: /app/workspace/in
            - name: workspace-out
              mountPath: /app/workspace/out

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"

          livenessProbe:
            httpGet:
              path: /beigebox/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /beigebox/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: beigebox-data
          persistentVolumeClaim:
            claimName: beigebox-data
        - name: config
          configMap:
            name: beigebox-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: runtime-config
          configMap:
            name: beigebox-config
            items:
              - key: runtime_config.yaml
                path: runtime_config.yaml
        - name: workspace-in
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        - name: workspace-out
          emptyDir: {}
