apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beigebox-data
  labels:
    app: beigebox
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard    # Change to your cluster's StorageClass
  resources:
    requests:
      storage: 20Gi             # ChromaDB + SQLite; increase for heavy semantic cache
