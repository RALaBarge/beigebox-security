apiVersion: v1
kind: ConfigMap
metadata:
  name: beigebox-config
data:
  # Inline your config.yaml here, or use `kubectl create configmap` to import
  # from a file:
  #
  #   kubectl create configmap beigebox-config \
  #     --from-file=config.yaml=../../config.yaml \
  #     --from-file=runtime_config.yaml=../../runtime_config.yaml \
  #     --dry-run=client -o yaml | kubectl apply -f -
  #
  # The placeholder below is the minimal required content so the Pod starts.
  # Replace with your actual config.yaml before deploying.

  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 8000
    backend:
      default_model: "qwen3:4b"
      url: "http://ollama:11434"
      timeout: 120
    storage:
      type: sqlite
      path: /app/data/beigebox.db
      vector_store_path: /app/data/chroma
      vector_backend: chromadb
    wiretap:
      enabled: true
      path: /app/data/wire.jsonl
    embedding:
      model: "nomic-embed-text"
      backend: "ollama"
    decision_llm:
      enabled: false
    operator:
      enabled: false
    harness:
      enabled: false
    logging:
      level: "INFO"

  runtime_config.yaml: |
    # Hot-reloaded at runtime — edit values here and apply with:
    #   kubectl patch configmap beigebox-config --patch '...'
    # then restart the pod to pick up the new mount.
    default_model: "qwen3:4b"
    temperature: 0.7
