# Routing classifier holdout set — admin/dev prompts, all four routes
#
# Run:  beigebox eval evals/routing_holdout.yaml --url http://localhost:1337
#
# Each case uses scorer: route_check which calls /api/v1/route-check.
# No inference runs — only the routing pipeline executes. Fast and cheap.
#
# REVIEW INSTRUCTIONS:
#   Scan the "route:" labels below. Change any you disagree with.
#   "simple"   → small/fast model (quick facts, one-liners, status checks)
#   "complex"  → large model (architecture, analysis, multi-step reasoning)
#   "code"     → code model (write/fix/explain specific code)
#   "creative" → creative model (writing, brainstorming, explanations for humans)
# -------------------------------------------------------------------

name: "routing_holdout"

