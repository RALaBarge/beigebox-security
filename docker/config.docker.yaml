# beigebox config — Docker deployment
# Uses container service names for networking.
# For bare-metal, use config.yaml instead.

# --- Backend (where requests get forwarded) ---
backend:
  url: "http://ollama:11434"            # Docker service name
  default_model: "qwen3:4b"         # Main chat model — pulled by ollama-init
  timeout: 120

# --- Middleware Server ---
server:
  host: "0.0.0.0"
  port: 8000

# --- Embedding ---
embedding:
  model: "nomic-embed-text"
  backend_url: "http://ollama:11434"

# --- Storage ---
storage:
  sqlite_path: "./data/conversations.db"
  chroma_path: "./data/chroma"
  log_conversations: true

# --- Tools ---
tools:
  enabled: true
  webhook_url: ""
  web_search:
    enabled: true
    provider: "duckduckgo"
    max_results: 5
  web_scraper:
    enabled: true
    max_content_length: 10000
  google_search:
    enabled: false
    api_key: "${GOOGLE_API_KEY}"
    cse_id: "${GOOGLE_CSE_ID}"
  calculator:
    enabled: true
  datetime:
    enabled: true
    local_tz_offset: -5.0
  system_info:
    enabled: true
  memory:
    enabled: true
    max_results: 3
    min_score: 0.3
  browserbox:
    enabled: true
    ws_url: ws://host.docker.internal:9009   # relay running on host
    timeout: 10
  ensemble:
    enabled: false
    judge_model: ""
    max_models: 6

# --- Decision LLM ---
decision_llm:
  enabled: true                          # Enabled by default in Docker — setup pulls the model
  model: "llama3.2:3b"                   # Routing judge — no thinking mode, faster than qwen3
  backend_url: "http://ollama:11434"
  timeout: 15                            # seconds; bumped from 5 — accounts for GPU cold-start
  max_tokens: 256
  routes:
    default:
      model: "qwen3:4b"
      description: "General purpose conversation and Q&A"
      wasm_module: "opener_strip"
    code:
      model: "qwen3:4b"
      description: "Code generation, debugging, technical programming tasks"
      # no wasm_module — code responses should not be stripped
    large:
      model: "qwen3:4b"
      description: "Complex reasoning, analysis, long-form writing"
      wasm_module: "opener_strip"
    fast:
      model: "qwen3:4b"
      description: "Quick responses, simple questions, brainstorming"
      wasm_module: "opener_strip"

# --- Operator ---
operator:
  enabled: true                           # CAUTION: enables LLM-driven tool execution. Review allowed_tools before enabling.
  model: "qwen3:4b"                   # Defaults to backend.default_model
  max_iterations: 10
  timeout: 300                            # 5 min — large models (8B+ fp16) need time to load on first inference
  allowed_tools: []                       # Empty = all registered tools. Restrict: ["system_info", "memory", "calculator", "datetime"]
  shell:
    enabled: true
    # All shell commands are routed through /usr/local/bin/bb (restricted busybox).
    # This allowlist is the first gate; the bb wrapper enforces a blocklist as the second.
    # Only add applets that are genuinely useful for system observability.
    shell_binary: "/usr/local/bin/bb"
    allowed_commands:
      - ls
      - cat
      - grep
      - ps
      - df
      - free
      - du
      - uptime
      - uname
      - env
      - printenv
      - whoami
      - id
      - hostname
      - date
    blocked_patterns:
      # Belt-and-suspenders: reject at the config layer even if the applet
      # somehow passes the bb wrapper check.
      - "rm"
      - "chmod"
      - "chown"
      - "chroot"
      - "mv"
      - "cp"
      - "> "          # output redirection
      - ">>"          # append redirection
      - "sudo"
      - "su "
      - "| sh"        # pipe to shell
      - "| bash"
      - "| ash"
      - "$()"         # command substitution
      - "`"           # backtick substitution
  data:
    sqlite_queries:   # named query templates the agent can call by name
      recent_conversations: >
        SELECT c.id, c.created_at, COUNT(m.id) as msg_count
        FROM conversations c JOIN messages m ON m.conversation_id = c.id
        GROUP BY c.id ORDER BY c.created_at DESC LIMIT 10
      token_usage_by_model: >
        SELECT model, SUM(token_count) as tokens, COUNT(*) as messages
        FROM messages GROUP BY model ORDER BY tokens DESC
      search_messages: >
        SELECT role, content, model, timestamp FROM messages
        WHERE content LIKE ? ORDER BY timestamp DESC LIMIT 20
      todays_conversations: >
        SELECT c.id, c.created_at, COUNT(m.id) as msg_count
        FROM conversations c JOIN messages m ON m.conversation_id = c.id
        WHERE date(c.created_at) = date('now')
        GROUP BY c.id ORDER BY c.created_at DESC

# --- Hooks ---
hooks:
  directory: "./hooks"

# --- Advanced ---
advanced:
  stream_stall_timeout_seconds: 120   # Give Ollama time to cold-load models from disk

# --- Logging ---
logging:
  level: "DEBUG"
  file: "/app/logs/beigebox.log"

# --- Wiretap ---
wiretap:
  path: "./data/wire.jsonl"

# --- Auto-summarization ---
auto_summarization:
  enabled: false               # Enable to compress long conversations automatically
  token_budget: 3000           # Trigger when estimated tokens exceed this
  summary_model: "qwen3:4b" # Model to use for summarization (defaults to backend.default_model)
  keep_last: 4                 # Always keep the N most recent messages intact
  summary_prefix: "Summary of earlier conversation: "

# --- System Context (global prompt injection) ---
system_context:
  enabled: false
  path: ./data/system_context.md

# --- Generation Parameters (global inference overrides) ---
# Uncomment values to override. Leave unset to let frontend decide.
# generation:
#   force: false
#   temperature: ~
#   top_p: ~
#   top_k: ~
#   num_ctx: ~
#   repeat_penalty: ~
#   max_tokens: ~
#   seed: ~

# --- WASM Transform Pipeline ---
wasm:
  enabled: true
  timeout_ms: 5000          # PDF parsing can be slow — give it 5s
  default_module: ""        # No global default; modules selected per-request
  modules:
    pdf_oxide:
      enabled: true
      path: "/app/wasm_modules/pdf_oxide/pdf-oxide-wasi.wasm"
      description: "Extract text/markdown from PDF files (pdf_oxide 0.3)"
    passthrough:
      enabled: false
      path: "/app/wasm_modules/passthrough/target/wasm32-wasip1/release/passthrough.wasm"
      description: "Identity transform — for testing"
    json_extractor:
      enabled: false
      path: "/app/wasm_modules/json_extractor/target/wasm32-wasip1/release/json_extractor.wasm"
      description: "Extract JSON objects from freeform text"
    markdown_stripper:
      enabled: false
      path: "/app/wasm_modules/markdown_stripper/target/wasm32-wasip1/release/markdown_stripper.wasm"
      description: "Strip markdown formatting to plain text"
    opener_strip:
      enabled: false
      path: "/app/wasm_modules/opener_strip/target/wasm32-wasip1/release/opener_strip.wasm"
      description: "Strip verbose opening phrases from responses"
    pii_redactor:
      enabled: false
      path: "/app/wasm_modules/pii_redactor/target/wasm32-wasip1/release/pii_redactor.wasm"
      description: "Redact PII (emails, phone numbers, SSNs) from text"

# --- Voice (Push-to-talk + TTS autoplay) ---
voice:
  enabled: false               # Enable voice input/output
  stt_url: "http://whisper:8000"   # faster-whisper-server container
  tts_url: "http://kokoro:8880"    # kokoro-fastapi container
  tts_voice: "af_heart"            # Kokoro default — see /v1/audio/voices for full list
  tts_model: "kokoro"
  tts_speed: 1.0
  tts_autoplay: false          # Set true to auto-speak assistant responses
  hotkey: ""                   # Push-to-talk hotkey (e.g. "v")
