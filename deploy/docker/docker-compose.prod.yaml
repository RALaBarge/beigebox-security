# BeigeBox — Production Docker Compose
#
# Usage:
#   cp .env.prod.example .env
#   docker compose -f docker-compose.prod.yaml up -d
#
# Differences from the dev compose:
#   - Named volumes with explicit driver opts for data persistence
#   - Host-bound mounts for config, hooks, skills, wasm (easy updates)
#   - restart: always (recover from crashes)
#   - Log rotation enforced
#   - No GPU reservation block by default — uncomment for NVIDIA

services:
  ollama:
    image: ollama/ollama:latest
    container_name: beigebox-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: always
    environment:
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL:-3}"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  beigebox:
    image: ghcr.io/ralabarge/beigebox:latest
    # Or build locally:
    # build:
    #   context: ../..
    #   dockerfile: docker/Dockerfile
    container_name: beigebox
    ports:
      - "${BEIGEBOX_PORT:-1337}:8000"
    volumes:
      # Persistent data — SQLite + ChromaDB live here
      - beigebox_data:/app/data
      # Host-side config — edit without rebuilding the image
      - ${BEIGEBOX_CONFIG_PATH:-../../config.yaml}:/app/config.yaml:ro
      # User-supplied hooks, skills, wasm modules
      - ${HOOKS_PATH:-../../hooks}:/app/hooks:ro
      - ${SKILLS_PATH:-../../2600/skills}:/app/2600/skills:ro
      - ${WASM_PATH:-../../wasm_modules}:/app/wasm_modules:ro
      # Agent workspace
      - ${WORKSPACE_OUT_PATH:-../../workspace/out}:/app/workspace/out:rw
      - type: tmpfs
        target: /app/workspace/in
        tmpfs:
          size: 536870912  # 512 MB in-memory scratch
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_HOST: "${OLLAMA_HOST:-ollama}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      GOOGLE_CSE_ID: "${GOOGLE_CSE_ID:-}"
      BROWSERBOX_WS_URL: "${BROWSERBOX_WS_URL:-ws://host.docker.internal:9009}"
      BB_MASTER_KEY: "${BB_MASTER_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
    depends_on:
      ollama:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/beigebox/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  ollama_models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${OLLAMA_DATA_PATH:-/mnt/storage/ollama}"
  beigebox_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${BEIGEBOX_DATA_PATH:-/mnt/storage/beigebox/data}"
