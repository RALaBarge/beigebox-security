[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "beigebox"
version = "1.9"
description = "Tap the line. Control the carrier."
readme = "README.md"
license = {text = "AGPL-3.0 (see LICENSE.md and COMMERCIAL_LICENSE.md for dual-license options)"}
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "httpx>=0.27.0",
    "pyyaml>=6.0",
    "pydantic>=2.4.0",
    "pydantic-settings>=2.0",
    "python-dotenv>=1.0",
    "chromadb>=0.5.0",
    "ddgs>=0.1",
    "beautifulsoup4>=4.12.0",
    "requests>=2.32.4",
    "numpy>=1.24.0",
    "zeroconf>=0.131.0",
    "nats-py>=2.6.0",
    "psutil>=5.9.0",
    "pynvml>=11.5.0",
    "itsdangerous>=2.0",
    "python-multipart>=0.0.9",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["beigebox*"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]

[project.scripts]
beigebox = "beigebox.cli:main"
