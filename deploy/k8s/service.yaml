apiVersion: v1
kind: Service
metadata:
  name: beigebox
  labels:
    app: beigebox
spec:
  type: ClusterIP          # Change to NodePort or LoadBalancer for external access
  selector:
    app: beigebox
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP

---
