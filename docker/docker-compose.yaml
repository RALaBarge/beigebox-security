# BeigeBox — Full Stack (Middleware + LLM)
# Tap the line. Control the carrier.
#
# QUICKSTART:
#   docker compose up -d          ← full working stack (CPU inference)
#   Open browser to: http://localhost:1337
#
# PROFILES:
#   (default)           Ollama (CPU) + BeigeBox — transparent proxy + integrated UI
#   voice               adds Whisper (STT) + Kokoro (TTS)
#   engines-cpp         use llama.cpp instead of Ollama (quantized models, minimal resource)
#   engines-vllm        use vLLM instead of Ollama (production-grade inference)
#   engines-executorch  use ExecutorTorch instead of Ollama (edge/mobile inference)
#
# EXAMPLES:
#   docker compose up -d                              # full stack, Ollama (default)
#   docker compose --profile voice up -d              # + voice I/O
#   docker compose --profile engines-cpp up -d        # use llama.cpp instead
#   docker compose --profile engines-vllm up -d       # use vLLM instead
#   docker compose --profile engines-executorch up -d # use ExecutorTorch instead
#   docker compose up -d beigebox                     # proxy only (external Ollama)
#
# NVIDIA GPU:
#   Uncomment the 'deploy' block on the ollama service below, then:
#   docker compose up -d
#
# CONFIGURATION:
#   cp env.example .env  → set OLLAMA_DATA, ports, API keys
#
# SERVICES:
#   ollama          → :11434  LLM inference engine (default)
#   beigebox        → :1337   transparent proxy + integrated web UI
#   whisper         → :9000   speech-to-text (voice profile)
#   kokoro          → :8880   text-to-speech (voice profile)
#   llama-cpp       → :8001   C++ inference (engines-cpp profile)
#   vllm            → :8002   Production inference (engines-vllm profile)
#   executorch      → :8003   Edge inference (engines-executorch profile)
#
# ALTERNATIVE FRONTENDS:
#   BeigeBox exposes OpenAI-compatible /v1 endpoint.
#   Use any frontend (Open WebUI, LM Studio, etc):
#   docker run -d -p 3000:8080 \
#     -e OPENAI_API_BASE_URL=http://host.docker.internal:1337/v1 \
#     -e OPENAI_API_KEY=any-key \
#     ghcr.io/open-webui/open-webui:main

services:
  # ---------------------------------------------------------------------------
  # Ollama — LLM inference (CPU by default)
  # ---------------------------------------------------------------------------
  # For NVIDIA GPU: uncomment the 'deploy' block below and restart.
  ollama:
    image: ollama/ollama:latest
    container_name: beigebox-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - /mnt/storage/ollama:/root/.ollama
    restart: unless-stopped
    environment:
      OLLAMA_NUM_PARALLEL: "3"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # Model pull — runs once to ensure required models exist
  # ---------------------------------------------------------------------------
  ollama-model-pull:
    image: curlimages/curl
    container_name: beigebox-model-pull
    depends_on:
      ollama:
        condition: service_started
    command: >
      sh -c "sleep 5 &&
      curl -s http://ollama:11434/api/pull -d '{\"name\":\"nomic-embed-text\"}' &&
      curl -s http://ollama:11434/api/pull -d '{\"name\":\"llama3.2:3b\"}' &&
      curl -s http://ollama:11434/api/pull -d '{\"name\":\"qwen3:4b\"}'"
    restart: "no"

  # ---------------------------------------------------------------------------
  # BeigeBox — transparent LLM proxy + middleware
  # ---------------------------------------------------------------------------
  beigebox:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: beigebox
    ports:
      - "${BEIGEBOX_PORT:-1337}:8000"
    volumes:
      - beigebox_data:/app/data
      - ../hooks:/app/hooks:ro
      - ../2600/skills:/app/2600/skills:ro
      - ../workspace/out:/app/workspace/out:rw
      - ../wasm_modules:/app/wasm_modules:ro
      - type: tmpfs
        target: /app/workspace/in
        tmpfs:
          size: 536870912   # 512 MB — files never touch disk, auto-cleared on stop
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_CSE_ID=${GOOGLE_CSE_ID:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-ollama}
      - BROWSERBOX_WS_URL=${BROWSERBOX_WS_URL:-ws://host.docker.internal:9009}
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/beigebox/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Whisper — STT (voice profile)
  # ---------------------------------------------------------------------------
  whisper:
    profiles: [voice]
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: beigebox-whisper
    ports:
      - "${WHISPER_PORT:-9000}:8000"
    volumes:
      - whisper_cache:/root/.cache/huggingface
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-Systran/faster-whisper-base}
      - WHISPER__DEVICE=cpu
      - WHISPER__INFERENCE_DEVICE=cpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Kokoro — TTS (voice profile)
  # ---------------------------------------------------------------------------
  kokoro:
    profiles: [voice]
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: beigebox-kokoro
    ports:
      - "${KOKORO_PORT:-8880}:8880"
    volumes:
      - kokoro_models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ---------------------------------------------------------------------------
  # llama.cpp — C++ inference engine (engines-cpp profile)
  # ---------------------------------------------------------------------------
  # Fast inference for GGUF (quantized) models. Minimal resource usage.
  # Set MODEL_PATH to GGUF file or dir. BeigeBox will auto-route compatible models.
  llama-cpp:
    profiles: [engines-cpp]
    image: ghcr.io/abetlen/llama-cpp-python:latest
    container_name: beigebox-llama-cpp
    ports:
      - "${LLAMA_CPP_PORT:-8001}:8000"
    volumes:
      - llama_cpp_models:/models
    environment:
      - MODEL_PATH=${LLAMA_CPP_MODEL_PATH:-/models}
      - N_CTX=${LLAMA_CPP_CONTEXT:-4096}
      - N_GPU_LAYERS=${LLAMA_CPP_GPU_LAYERS:-0}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # vLLM — Production inference engine (engines-vllm profile)
  # ---------------------------------------------------------------------------
  # Industrial-grade inference with batching, multi-GPU support, fast generation.
  # Set MODEL to HuggingFace model ID. GPU support via CUDA image + deploy block.
  vllm:
    profiles: [engines-vllm]
    image: vllm/vllm-openai:latest
    container_name: beigebox-vllm
    ports:
      - "${VLLM_PORT:-8002}:8000"
    volumes:
      - vllm_models:/root/.cache/huggingface
    environment:
      - MODEL=${VLLM_MODEL:-meta-llama/Llama-2-7b-hf}
      - MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-4096}
      - GPU_MEMORY_UTILIZATION=${VLLM_GPU_MEM:-0.9}
      - TRUST_REMOTE_CODE=${VLLM_TRUST_REMOTE_CODE:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Uncomment for GPU support (requires nvidia-docker):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # ExecutorTorch — Edge inference engine (engines-executorch profile)
  # ---------------------------------------------------------------------------
  # Meta's lightweight inference engine for edge/mobile models.
  # Generic containerized runtime. Expects pre-compiled .pte models.
  executorch:
    profiles: [engines-executorch]
    image: pytorch/executorch:latest
    container_name: beigebox-executorch
    ports:
      - "${EXECUTORCH_PORT:-8003}:8000"
    volumes:
      - executorch_models:/models
    environment:
      - MODEL_PATH=${EXECUTORCH_MODEL_PATH:-/models}
      - TORCH_DTYPE=${EXECUTORCH_DTYPE:-float32}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ollama_data:
  beigebox_data:
  whisper_cache:
  kokoro_models:
  llama_cpp_models:
  vllm_models:
  executorch_models:
