# beigebox config — Docker deployment (Phase-2 schema)
# SINGLE SOURCE OF TRUTH for all HTTP/URI endpoints and model defaults.
# Do not hardcode backends, models, or URLs anywhere else in code.
#
# All feature flags and settings go here. Each feature defined exactly once.
# Enable/disable via enabled: true/false in each block.

# ─────────────────────────────────────────────────────────────────────────────
# Middleware Server
# ─────────────────────────────────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8000

# ─────────────────────────────────────────────────────────────────────────────
# Multi-Backend Routing
# ─────────────────────────────────────────────────────────────────────────────
backends_enabled: true
backends:
  - provider: ollama
    name: ollama-local
    url: "http://ollama:11434"
    timeout: 120
    timeout_ms: 120000
    priority: 1
    max_retries: 2
    backoff_base: 1.5
    backoff_max: 10.0

  - provider: openrouter
    name: openrouter
    url: "https://openrouter.ai/api/v1"
    api_key: "${OPENROUTER_API_KEY}"
    timeout: 120
    timeout_ms: 120000
    priority: 2
    max_retries: 2
    backoff_base: 1.5
    backoff_max: 10.0

  # Mac M1 — MLX inference (Devstral 24B 6-bit + others)
  - provider: mlx
    name: mlx-mac
    url: "http://192.168.1.214:8080"
    timeout: 900
    timeout_ms: 900000
    priority: 3
    max_retries: 1

# ─────────────────────────────────────────────────────────────────────────────
# Models — Unified allocation (Phase 2)
# ─────────────────────────────────────────────────────────────────────────────
models:
  default: "llama3.2:3b"           # Used by all subsystems unless overridden
  profiles:
    routing: "llama3.2:3b"         # Decision LLM / routing judge (fast, lightweight)
    agentic: "llama3.2:3b"         # Operator / tool use
    summary: "llama3.2:3b"         # Context compression (lightweight)
  per_task:
    pre_hook: null
    post_hook: null
    reflection: null
    context_pruning: null
  whitelist:
    enabled: false
    allowed_models: []

# ─────────────────────────────────────────────────────────────────────────────
# Storage
# ─────────────────────────────────────────────────────────────────────────────
storage:
  type: sqlite
  path: ./data/beigebox.db
  vector_store_path: ./data/chroma
  vector_backend: postgres
  postgres:
    connection_string: postgresql://postgres:postgres@postgres:5432/beigebox
    pool_size: 5
  log_conversations: true

# ─────────────────────────────────────────────────────────────────────────────
# Embedding (for classifier, semantic cache, vector store)
# ─────────────────────────────────────────────────────────────────────────────
embedding:
  model: "nomic-embed-text"
  backend: "ollama"

# ─────────────────────────────────────────────────────────────────────────────
# Routing Pipeline — Hybrid routing: session cache → classifier → decision LLM → backend
# ─────────────────────────────────────────────────────────────────────────────
routing:
  model_routes:
    - pattern: "mlx-community/*"
      backend: mlx-mac
    - pattern: "devstral*"
      backend: mlx-mac
    - pattern: "mistral*"
      backend: mlx-mac

  session_cache:
    ttl_seconds: 3600
    max_entries: 1000
    trim_to: 800
    evict_every_writes: 100

  classifier:
    enabled: true
    centroid_rebuild_interval: 3600

  decision_llm:
    enabled: true
    temperature: 0.2
    max_tokens: 256
    system_prompt: "You are a helpful routing assistant that decides which tool or backend to use."
    routes:
      default:
        model: "llama3.2:3b"
        description: "General purpose conversation and Q&A"
        wasm_module: "opener_strip"
      code:
        model: "llama3.2:3b"
        description: "Code generation, debugging, technical programming tasks"
      large:
        model: "llama3.2:3b"
        description: "Complex reasoning, analysis, long-form writing"
        wasm_module: "opener_strip"
      fast:
        model: "llama3.2:3b"
        description: "Quick responses, simple questions, brainstorming"
        wasm_module: "opener_strip"

# ─────────────────────────────────────────────────────────────────────────────
# Tools (Function Calling)
# ─────────────────────────────────────────────────────────────────────────────
tools:
  enabled: true
  webhook_url: ""
  registry:
    - name: web_search
      description: "Search the web for current information"
      enabled: true
      provider: "duckduckgo"
      max_results: 5
    - name: web_scraper
      description: "Scrape a webpage for content"
      enabled: true
      max_content_length: 10000
    - name: calculator
      description: "Perform mathematical calculations"
      enabled: true
    - name: datetime_tool
      description: "Get current date/time in any timezone"
      enabled: true
      local_tz_offset: -5.0
    - name: system_info
      description: "Get system information"
      enabled: true
    - name: google_search
      description: "Google Custom Search"
      enabled: false
      api_key: "${GOOGLE_API_KEY}"
      cse_id: "${GOOGLE_CSE_ID}"

  memory:
    enabled: true
    max_results: 3
    min_score: 0.3

  document_search:
    enabled: true
    max_results: 15
    min_score: 0.0

  aura_recon:
    enabled: true
    ws_url: ws://host.docker.internal:9009
    timeout: 30

  sf_ingest:
    enabled: true
    ws_url: ws://host.docker.internal:9009
    timeout: 60
    out_dir: /app/workspace/out/rag/SF

  # Live Jira + Confluence REST. Credentials read from env vars
  # (ATLASSIAN_BASE_URL / ATLASSIAN_EMAIL / ATLASSIAN_API_TOKEN), set via
  # ~/.beigebox/.env which docker-compose passes through with env_file.
  atlassian:
    enabled: true

  browserbox:
    enabled: true
    ws_url: ws://host.docker.internal:9009
    timeout: 10

  cdp:
    enabled: true
    ws_url: ws://host.docker.internal:9222
    timeout: 10

  ensemble:
    enabled: false
    judge_model: ""
    max_models: 6

  plugins:
    enabled: true
    path: ./plugins
    repo:
      enabled: true
    zip_inspector:
      enabled: true
    doc_parser:
      enabled: true
      max_ref_tokens: 4000
      chunk_size: 800
      chunk_overlap: 80

# ─────────────────────────────────────────────────────────────────────────────
# Operator Agent (agentic tool use)
# ─────────────────────────────────────────────────────────────────────────────
operator:
  enabled: true
  max_iterations: 10
  allowed_tools: []
  browser_meta_tool: false
  tool_profiles:
    minimal:
      - document_search
      - calculator
      - datetime_tool
    standard:
      - document_search
      - memory
      - web_search
      - web_scraper
      - calculator
      - datetime_tool
    full:
      - document_search
      - memory
      - aura_recon
      - sf_ingest
      - web_search
      - web_scraper
      - calculator
      - datetime_tool
      - system_info
  autonomous:
    enabled: false
    max_turns: 5
  context_pruning:
    enabled: false
    model: ""
    timeout: 8
  reflection:
    enabled: false
    model: ""
    timeout: 20
  pre_hook:
    enabled: false
    model: "qwen3:4b"
    max_iterations: 3
  post_hook:
    enabled: false
    model: "qwen3:4b"
    max_iterations: 3
  shell:
    enabled: true
    shell_binary: "/usr/local/bin/bb"
    allowed_commands:
      - ls
      - cat
      - grep
      - ps
      - df
      - free
      - du
      - uptime
      - uname
      - env
      - printenv
      - whoami
      - id
      - hostname
      - date
    blocked_patterns:
      - "rm"
      - "chmod"
      - "chown"
      - "chroot"
      - "mv"
      - "cp"
      - "> "
      - ">>"
      - "sudo"
      - "su "
      - "| sh"
      - "| bash"
      - "| ash"
      - "$()"
      - "`"

# ─────────────────────────────────────────────────────────────────────────────
# Harness (multi-turn orchestration)
# ─────────────────────────────────────────────────────────────────────────────
harness:
  enabled: true
  ralph_enabled: false
  retry:
    max_retries: 2
    backoff_base: 1.5
    backoff_max: 10
  stagger:
    operator_seconds: 1.0
    model_seconds: 0.4
  store_runs: true
  max_stored_runs: 1000

# ─────────────────────────────────────────────────────────────────────────────
# Cost Tracking
# ─────────────────────────────────────────────────────────────────────────────
cost_tracking:
  enabled: true
  track_openrouter: true
  track_local: false

# ─────────────────────────────────────────────────────────────────────────────
# Conversation Replay
# ─────────────────────────────────────────────────────────────────────────────
conversation_replay:
  enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# Hooks
# ─────────────────────────────────────────────────────────────────────────────
hooks:
  enabled: false
  directory: "./hooks"

  # Webhook emitter — POSTs run_start / run_end events to a remote URL.
  # Env var BEIGEBOX_WEBHOOK_URL overrides `url` if set.
  webhook_emitter:
    enabled: false
    url: ""                        # e.g. https://hooks.example.com/beigebox
    timeout_ms: 1500               # per-POST hard timeout
    queue_size: 256                # bounded; events drop on overflow
    include_user_message: false    # opt-in; off by default for privacy

# ─────────────────────────────────────────────────────────────────────────────
# WASM Transform Pipeline
# ─────────────────────────────────────────────────────────────────────────────
wasm:
  enabled: true
  timeout_ms: 5000
  default_module: ""
  modules:
    pdf_oxide:
      enabled: true
      path: "/app/wasm_modules/pdf_oxide/pdf-oxide-wasi.wasm"
      description: "Extract text/markdown from PDF files (pdf_oxide 0.3)"
    passthrough:
      enabled: false
      path: "/app/wasm_modules/passthrough/target/wasm32-wasip1/release/passthrough.wasm"
      description: "Identity transform — for testing"
    json_extractor:
      enabled: false
      path: "/app/wasm_modules/json_extractor/target/wasm32-wasip1/release/json_extractor.wasm"
      description: "Extract JSON objects from freeform text"
    markdown_stripper:
      enabled: false
      path: "/app/wasm_modules/markdown_stripper/target/wasm32-wasip1/release/markdown_stripper.wasm"
      description: "Strip markdown formatting to plain text"
    opener_strip:
      enabled: true
      path: "/app/wasm_modules/opener_strip/target/wasm32-wasip1/release/opener_strip.wasm"
      description: "Strip verbose opening phrases from responses"
    pii_redactor:
      enabled: false
      path: "/app/wasm_modules/pii_redactor/target/wasm32-wasip1/release/pii_redactor.wasm"
      description: "Redact PII (emails, phone numbers, SSNs) from text"

# ─────────────────────────────────────────────────────────────────────────────
# Timeouts — Centralized (all in one place)
# ─────────────────────────────────────────────────────────────────────────────
timeouts:
  backend_seconds: 900             # LLM inference timeout
  decision_llm_seconds: 15         # Routing judge timeout
  operator_seconds: 300            # Single operator iteration timeout
  operator_run_seconds: 600        # Full operator run timeout
  harness_task_seconds: 120        # Harness task timeout
  harness_operator_seconds: 180    # Harness operator step timeout
  embedding_seconds: 5.0           # Embedding API call timeout
  request_seconds: 900             # Global request timeout
  stream_stall_seconds: 300        # Stream stall detection timeout

# ─────────────────────────────────────────────────────────────────────────────
# Logging & Observability
# ─────────────────────────────────────────────────────────────────────────────
logging:
  level: "DEBUG"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/app/logs/beigebox.log"
  max_bytes: 10485760
  backup_count: 5

wiretap:
  enabled: true
  path: "./data/wire.jsonl"
  max_lines: 100000
  rotation_enabled: true
  description: "Structured log of all messages through the proxy (for conversation tracing)"

payload:
  enabled: false
  path: "./data/payload.jsonl"
  description: "Full LLM request/response payloads (for debugging backend issues)"

# ─────────────────────────────────────────────────────────────────────────────
# Advanced
# ─────────────────────────────────────────────────────────────────────────────
advanced:
  max_concurrent_requests: 10
  embedding_batch_size: 32
  wiretap_compress: false
  runtime_config_check_interval: 1.0
  mcp:
    max_request_bytes: 1000000
  backends:
    latency_window_size: 100

# ─────────────────────────────────────────────────────────────────────────────
# Toolbox (Tab 8) — inspect/edit tools and skills from the browser
# ─────────────────────────────────────────────────────────────────────────────
toolbox:
  edits_enabled: true       # Tool .py and skill .md files are writable from the UI.
                            # Writes require a container restart to take effect.
                            # A write via this endpoint is equivalent to RCE — keep
                            # API keys scoped and do not expose BeigeBox publicly.
