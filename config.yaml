# BeigeBox Configuration — Complete v1.0+ Setup
# Generated: February 24, 2026
# 
# This is a full production-ready config with all v1.0 features enabled/configured.
# Copy this to your project root as config.yaml (or merge with existing if you have custom settings)

# ─────────────────────────────────────────────────────────────────────────────
# Server Configuration
# ─────────────────────────────────────────────────────────────────────────────

server:
  host: "0.0.0.0"
  port: 8001
  log_level: "INFO"
  log_conversations: true

# ─────────────────────────────────────────────────────────────────────────────
# Backend Configuration — UPDATED with retry/cooldown + generic OpenAI support
# ─────────────────────────────────────────────────────────────────────────────

backend:
  default_model: "qwen3:4b"
  url: "http://localhost:11434"  # Ollama default
  timeout: 120
  # Model path resolution — smart fallback chain:
  # 1. OLLAMA_DATA env var (if set) → {OLLAMA_DATA}/models (Ollama's native location)
  # 2. MODELS_PATH env var (explicit override)
  # 3. model_paths list below (first existing path used)
  # 4. models_path single path (simple case)
  # 5. Default: /mnt/storage/models
  #
  # Uncomment ONE of the following approaches:
  #
  # SIMPLE: Single unified model directory (all backends share it)
  # models_path: "/mnt/storage/models"
  #
  # ADVANCED: Multiple mount points with priority (first existing wins)
  # Useful when models are scattered across different storage locations
  model_paths:
    - "/mnt/storage/models"        # Primary: fast NVMe SSD
    - "/mnt/archive/models"        # Fallback: slower HDD archive
    - "${HOME}/.ollama/models"     # Fallback: user's home directory
    - "/var/lib/models"            # Fallback: system-wide location

# Multi-backend routing (STEP 2 & 3: Retry logic + Generic OpenAI)
backends_enabled: true  # Set to true to enable multi-backend routing

backends:
  # Primary: Local Ollama
  - provider: ollama
    name: ollama-local
    url: http://localhost:11434
    timeout: 120
    priority: 2
    max_retries: 2
    backoff_base: 1.5
    backoff_max: 10.0

  # Tertiary: OpenRouter API fallback (optional)
  # Uncomment and add API key if you want API fallback.
  # By default BeigeBox will NOT send plain model ids like "llama3.2" here.
  # It only uses OpenRouter automatically for provider/model ids like
  # "openai/gpt-4o-mini" unless you turn on the runtime toggle below.
  # - provider: openrouter
  #   name: openrouter-fallback
  #   url: https://openrouter.io/api/v1
  #   api_key: ${OPENROUTER_API_KEY}
  #   timeout: 120
  #   priority: 3

# ─────────────────────────────────────────────────────────────────────────────
# Agent Workspace — persistent shared directory
# ─────────────────────────────────────────────────────────────────────────────
# Drop files into workspace/in/ on the host — agents see them at /workspace/in
# (read-only inside the bwrap sandbox). Agents write output to /workspace/out/,
# which you can retrieve directly from the host at workspace/out/.

workspace:
  path: ./workspace
  max_mb: 0     # 0 = no limit. Set e.g. 100 to warn at 100 MB.

# ─────────────────────────────────────────────────────────────────────────────
# Storage Configuration
# ─────────────────────────────────────────────────────────────────────────────

storage:
  type: sqlite
  path: ./data/beigebox.db
  vector_store_path: ./data/chroma
  # Vector backend driver.  Currently only "chromadb" is supported.
  # To add a backend: implement VectorBackend in storage/backends/<n>.py,
  # register it in storage/backends/__init__.py, then set the key here.
  vector_backend: chromadb

# ─────────────────────────────────────────────────────────────────────────────
# Wiretap (Request/Response Logging)
# ─────────────────────────────────────────────────────────────────────────────

wiretap:
  enabled: true
  path: ./data/wire.jsonl
  max_lines: 100000
  rotation_enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# Decision LLM (Intelligent Routing)
# ─────────────────────────────────────────────────────────────────────────────

decision_llm:
  enabled: true
  model: "llama3.2:3b"
  temperature: 0.2
  system_prompt: "You are a helpful routing assistant that decides which tool or backend to use."
  # routes:          # Define named routes with per-route model + wasm_module hints
  #   default:
  #     model: "llama3.2:3b"
  #     description: "General purpose conversation and Q&A"
  #     wasm_module: "opener_strip"   # suggest WASM post-processing for this route
  #   code:
  #     model: "llama3.2:3b"
  #     description: "Code generation, debugging, technical tasks"
  #     # no wasm_module — code responses should not be stripped

# ─────────────────────────────────────────────────────────────────────────────
# Cost Tracking
# ─────────────────────────────────────────────────────────────────────────────

cost_tracking:
  enabled: true
  track_openrouter: true
  track_local: false  # Set true if you want to track local inference "cost" (doesn't charge, for metrics)

# ─────────────────────────────────────────────────────────────────────────────
# Conversation Replay — STEP 1: Now respects runtime config changes
# ─────────────────────────────────────────────────────────────────────────────

conversation_replay:
  enabled: true  # Can be toggled in Config tab now

# ─────────────────────────────────────────────────────────────────────────────
# Auto-Summarization
# ─────────────────────────────────────────────────────────────────────────────

auto_summarization:
  enabled: false
  summary_model: "llama3.2:3b"  # model used to generate summaries (defaults to backend.default_model if blank)
  token_budget: 24000            # trigger when estimated token count exceeds this
  keep_last: 8                   # always keep the N most recent turns intact, unsummarised
  summary_prefix: "Summary of earlier conversation: "

# ─────────────────────────────────────────────────────────────────────────────
# System Context — Global Prompt Injection
# ─────────────────────────────────────────────────────────────────────────────
# Injects the contents of system_context.md into every proxied request as a
# system message. Hot-reloaded on every request via mtime check — no restart
# needed. Edit via the Config tab or POST /api/v1/system-context.

system_context:
  enabled: false
  path: ./system_context.md

# ─────────────────────────────────────────────────────────────────────────────
# Generation Parameters — Global Inference Overrides
# ─────────────────────────────────────────────────────────────────────────────
# Override generation parameters injected into every proxied request.
# Leave values unset to let the frontend decide. Set 'force: true' to
# override even frontend-provided values.
# All values are runtime-adjustable via the Config tab or POST /api/v1/config.

# generation:
#   force: false
#   temperature: ~       # 0.0–2.0
#   top_p: ~             # 0.0–1.0
#   top_k: ~             # integer
#   num_ctx: ~           # context window size
#   repeat_penalty: ~    # 0.0–2.0
#   max_tokens: ~        # max response tokens
#   seed: ~              # integer, for reproducibility

# ─────────────────────────────────────────────────────────────────────────────
# Voice (Speech-to-Text + Text-to-Speech)
# ─────────────────────────────────────────────────────────────────────────────

voice:
  enabled: false  # Set to true if you have faster-whisper and Kokoro running
  stt_model: "base"  # smaller=faster, larger=more accurate (tiny, base, small, medium, large)
  tts_voice: "af"    # Kokoro voice code

# ─────────────────────────────────────────────────────────────────────────────
# Harness Orchestrator — STEP 2 & 3: Works with retry + new backends
# ─────────────────────────────────────────────────────────────────────────────

harness:
  enabled: true
  ralph_enabled: false   # Ralph mode (test-driven loop with shell test_cmd) — off by default
  shadow_agents:
    enabled: false             # Counterfactual parallel run on turn 0
    model: ""                  # Defaults to operator model
    timeout: 30
    max_tool_calls: 3          # Budget: shadow is cheap, primary is full
    divergence_threshold: 0.3  # Jaccard: surface alternative if < 70% overlap
  retry:
    max_retries: 2
    backoff_base: 1.5
    backoff_max: 10
  stagger:
    operator_seconds: 1.0      # Delay between operator task launches
    model_seconds: 0.4         # Delay between model task launches
  timeouts:
    task_seconds: 120
    operator_seconds: 180
  store_runs: true
  max_stored_runs: 1000

# ─────────────────────────────────────────────────────────────────────────────
# Operator (Agentic Tool Use with ReAct)
# ─────────────────────────────────────────────────────────────────────────────

operator:
  enabled: true                         # CAUTION: enables LLM-driven tool execution. Review allowed_tools before enabling.
  model: "qwen3:4b"
  autonomous:
    enabled: false       # Set true to enable multi-turn autonomous mode
    max_turns: 5         # Max consecutive autonomous turns (stops early if no tool calls)
  context_pruning:
    enabled: false       # Compress previous-turn answers before feeding to history
    model: ""            # Defaults to operator model
    timeout: 8           # Seconds before pruner gives up and returns original
  reflection:
    enabled: false       # Async fire-and-forget reflection; insight injected next turn
    model: ""            # Defaults to operator model
    timeout: 20          # Seconds before reflection task is abandoned
  pre_hook:
    enabled: false       # When true, operator enriches every chat message before it reaches the LLM
    model: "qwen3:4b"    # Model to use for enrichment (defaults to operator.model if blank)
    max_iterations: 3    # Keep it fast — limit tool calls
  post_hook:
    enabled: false       # When true, operator runs a fire-and-forget pass after every LLM response
    model: "qwen3:4b"    # Model to use (defaults to operator.model if blank)
    max_iterations: 3
  max_iterations: 10
  timeout: 300           # seconds before an operator run is abandoned
  allowed_tools: []                     # Empty = all registered tools. Set explicitly to restrict: ["system_info", "memory", "calculator", "datetime"]
  shell:
    enabled: true
    shell_binary: "/usr/local/bin/bb"  # Custom hardened binary (optional)
    allowed_commands:
      - awk
      - cat
      - cut
      - df
      - du
      - find
      - free
      - grep
      - head
      - ls
      - nproc
      - nvidia-smi
      - ps
      - sed
      - sort
      - stat
      - tail
      - uniq
      - uptime
      - wc
    blocked_patterns:
      - "rm -rf"
      - "rm -r"
      - "sudo"
      - "> /etc"
      - "> /app"
      - "> /usr"
      - "$()"
      - "`"

# ─────────────────────────────────────────────────────────────────────────────
# Tools (Function Calling)
# ─────────────────────────────────────────────────────────────────────────────

tools:
  enabled: true
  registry:
    - name: web_search
      description: "Search the web for current information"
      enabled: true
    - name: web_scraper
      description: "Scrape a webpage for content"
      enabled: true
    - name: calculator
      description: "Perform mathematical calculations"
      enabled: true
    - name: datetime_tool
      description: "Get current date/time in any timezone"
      enabled: true
    - name: system_info
      description: "Get system information and run shell commands"
      enabled: true

  # ── BrowserBox (browser API relay) ────────────────────────────────────────
  # Requires: ws_relay.py running + BrowserBox Chrome extension connected.
  # pip install websockets
  # Docker: run relay with --host 0.0.0.0 and set BROWSERBOX_WS_URL=ws://host.docker.internal:9009
  browserbox:
    enabled: false
    ws_url: ${BROWSERBOX_WS_URL:-ws://localhost:9009}
    timeout: 10   # seconds

  # ── Memory (conversation recall + RAG) ────────────────────────────────────
  memory:
    enabled: true
    max_results: 3
    min_score: 0.3
    query_preprocess: false        # Extract keywords via LLM before ChromaDB lookup
    query_preprocess_model: "llama3.2:3b"  # Fast model for keyword extraction

  # ── Plugin system ─────────────────────────────────────────────────────────
  # Drop any .py file with a *Tool class into ./plugins/ and it auto-registers.
  # Set enabled: true here and per-plugin to activate.
  plugins:
    enabled: true
    path: ./plugins
    # Per-plugin overrides — key matches PLUGIN_NAME in the plugin file.
    # Absent = enabled by default once the master switch is on.
    # dice:
    #   enabled: false
    zip_inspector:
      enabled: true
    doc_parser:
      enabled: true
      ocr_model: ""        # e.g. "llava:7b" or "qwen2-vl:7b" for vision-model OCR
      max_ref_tokens: 4000 # token budget for returned excerpt (~4 chars/token)
      chunk_size: 800      # chars per ChromaDB chunk
      chunk_overlap: 80    # overlap between adjacent chunks

# ─────────────────────────────────────────────────────────────────────────────
# Connections — authenticated API access (no tokens here, metadata only)
#
# Tokens stored encrypted at ~/.bb/connections.enc (AES-256-GCM).
# Add tokens via CLI:
#   python -m beigebox.connections add <name>        (prompts securely)
#   python -m beigebox.connections add <name> --token-env ENV_VAR
#   python -m beigebox.connections list
#   python -m beigebox.connections test <name> --path /endpoint
#
# Key: BB_MASTER_KEY env var (64 hex chars) or auto-generated ~/.bb/.key (chmod 600)
# ─────────────────────────────────────────────────────────────────────────────

connections: {}
  # Example — uncomment and add token via CLI:
  # github:
  #   type: bearer
  #   base_url: https://api.github.com
  #   allowed_paths:
  #     - /user/**
  #     - /repos/**
  #     - /gists/**
  # openrouter:
  #   type: bearer
  #   base_url: https://openrouter.ai/api/v1
  #   allowed_paths:
  #     - /models
  #     - /chat/**

# ─────────────────────────────────────────────────────────────────────────────
# Hooks (Custom Middleware)
# ─────────────────────────────────────────────────────────────────────────────

hooks:
  enabled: false
  # Examples (uncomment to enable):
  # - name: filter_synthetic
  #   enabled: true
  # - name: rag_context
  #   enabled: true
  # - name: prompt_injection
  #   enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# Web UI Configuration
# ─────────────────────────────────────────────────────────────────────────────

web_ui:
  # STEP 4: Ensemble voting is now available via 🎯 Ensemble button
  palette: "dark"           # dark, light, high-contrast
  vi_mode: false            # vi-like keybindings (e.g., j/k for navigation)
  voice_enabled: false      # Show mic button
  voice_hotkey: ""          # e.g., "v" for Alt+V to toggle recording

# ─────────────────────────────────────────────────────────────────────────────
# Embedding & Classification (for routing decisions)
# ─────────────────────────────────────────────────────────────────────────────

embedding:
  model: "nomic-embed-text"
  backend: "ollama"         # Where embedding model runs

classifier:
  enabled: true
  centroid_rebuild_interval: 3600  # Rebuild every hour

# ─────────────────────────────────────────────────────────────────────────────
# Semantic Cache — deduplicate near-identical requests
# ─────────────────────────────────────────────────────────────────────────────
# Requests whose embedding is within `similarity_threshold` of a cached entry
# are served from cache without hitting the backend.

semantic_cache:
  enabled: false
  similarity_threshold: 0.92  # cosine similarity cutoff (0–1); higher = stricter
  max_entries: 500            # evict oldest when exceeded
  ttl_seconds: 3600           # cache entries expire after this many seconds

# ─────────────────────────────────────────────────────────────────────────────
# Z-Commands (Special command syntax like "z: code", "z: search")
# ─────────────────────────────────────────────────────────────────────────────

zcommands:
  enabled: true
  prefix: "z:"
  commands:
    - name: "search"
      description: "Search for information"
      route_to: "semantic_search"
    - name: "code"
      description: "Code generation and analysis"
      route_to: "operator"
    - name: "complex"
      description: "Complex reasoning task"
      route_to: "harness"
    - name: "help"
      description: "Show help message"
      route_to: "internal"

# ─────────────────────────────────────────────────────────────────────────────
# WASM Transform Modules — post-processing pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Drop compiled .wasm (WASI target) files into ./wasm_modules/ and register them
# here. The decision LLM can then select a module per request; the module reads
# the full response from stdin and writes the (possibly modified) response to stdout.
# Any language that compiles to WASI works (Rust, C, Go, AssemblyScript, …).
# Requires: pip install wasmtime

wasm:
  enabled: false
  modules:
    pdf_oxide:
      path: "./wasm_modules/pdf_oxide/pdf-oxide-wasi.wasm"
      enabled: true
      description: "Extract text/markdown from PDF files (pdf_oxide 0.3)"
    passthrough:
      path: "./wasm_modules/passthrough.wasm"
      enabled: false
      description: "Identity transform — passes response through unmodified (reference impl)"
    opener_strip:
      path: "./wasm_modules/opener_strip.wasm"
      enabled: false
      description: "Strip sycophantic opener phrases (Certainly!, Of course!, etc.)"
    pii_redactor:
      path: "./wasm_modules/pii_redactor.wasm"
      enabled: false
      description: "Redact PII (emails, phones, SSNs, credit cards) from responses"
    json_extractor:
      path: "./wasm_modules/json_extractor.wasm"
      enabled: false
      description: "Extract first valid JSON block from mixed prose+JSON responses"
    markdown_stripper:
      path: "./wasm_modules/markdown_stripper.wasm"
      enabled: false
      description: "Strip Markdown formatting for plain-text / TTS output"
  default_module: ""                 # Optional: always run this module regardless of routing
  timeout_ms: 5000                   # PDF parsing can be slow — give it 5s

# ─────────────────────────────────────────────────────────────────────────────
# Logging Configuration
# ─────────────────────────────────────────────────────────────────────────────

logging:
  level: "INFO"             # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/beigebox.log"
  max_bytes: 10485760       # 10MB
  backup_count: 5

# ─────────────────────────────────────────────────────────────────────────────
# Per-Model Options — Ollama inference settings per model name
# ─────────────────────────────────────────────────────────────────────────────
# ``options`` is passed directly to Ollama and controls the model loader.
# num_gpu: number of layers to offload to GPU (99 = all, 0 = CPU-only)
# num_ctx: context window size (overrides the global gen_num_ctx for this model)
# Any Ollama ``options`` key is accepted (num_thread, f16_kv, rope_scaling, etc.)
#
# These are applied at request time — Ollama picks them up on the next model
# load.  If the model is already resident, send ``keep_alive: 0`` once to evict
# it first, then the next request will reload with the new settings.

# models:
#   llama3.2:3b:
#     options:
#       num_gpu: 99          # offload all layers to GPU
#   llama2:70b:
#     options:
#       num_gpu: 20          # partial offload — stay within VRAM budget
#       num_ctx: 4096
#   mistral:7b:
#     options:
#       num_gpu: 0           # force CPU inference (benchmark / comparison)
#       num_ctx: 8192

# ─────────────────────────────────────────────────────────────────────────────
# Auth — Single API Key
# ─────────────────────────────────────────────────────────────────────────────
# Set api_key to a non-empty string to require authentication on all endpoints.
# The web UI (/), /ui, /beigebox/health, and /api/v1/status are always exempt.
# Accepted via: Authorization: Bearer <key>, api-key header, or ?api_key= param.
# Empty string (default) disables auth entirely.

# auth:
#   api_key: ""

# ─────────────────────────────────────────────────────────────────────────────
# Advanced Settings
# ─────────────────────────────────────────────────────────────────────────────

advanced:
  # Session cache for routing decisions
  session_cache_ttl: 3600
  
  # Maximum concurrent requests
  max_concurrent_requests: 10
  
  # Request timeout (global)
  request_timeout: 300
  
  # Embedding batch size
  embedding_batch_size: 32
  
  # Use compression for wiretap (reduces disk usage)
  wiretap_compress: false


# ─────────────────────────────────────────────────────────────────────────────
# AMF Mesh Advertisement
# ─────────────────────────────────────────────────────────────────────────────

amf_mesh:
  enabled: false              # set true to advertise on the local AMF mesh
  instance_name: "beigebox"  # mDNS service instance name
  host: "localhost"
  port: null                 # null → uses server.port above
  trust_domain: "local"
  nats_url: "nats://127.0.0.1:4222"  # empty string to disable NATS heartbeat
