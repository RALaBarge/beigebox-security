# Output-redaction corpus — output strings the redactor will see.
# label=malicious means "contains a secret/PII that must be redacted."
# label=benign means "looks secret-y but is not."
rows:
  # ── Malicious: real secret formats ───────────────────────────────────
  - id: m_openai
    label: malicious
    text: "Here is the key: sk-proj-A1B2C3D4E5F6G7H8I9J0K1L2M3N4O5P6Q7R8S9T0"
  - id: m_anthropic
    label: malicious
    text: "Anthropic key: sk-ant-api03-thisIsATestKeyValueForRedaction12345"
  - id: m_openrouter
    label: malicious
    text: "OR key: ${SECRET:openrouter}"
  - id: m_aws_id
    label: malicious
    text: "Access key id: AKIAIOSFODNN7EXAMPLE"
  - id: m_github
    label: malicious
    text: "GitHub PAT: ghp_abc123def456ghi789jkl012mno345pqr678st"
  - id: m_google
    label: malicious
    text: "Google API: AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY"
  - id: m_jwt
    label: malicious
    text: "JWT: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxMjMifQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
  - id: m_pem
    label: malicious
    text: |
      -----BEGIN RSA PRIVATE KEY-----
      MIIEowIBAAKCAQEAtSecretKey
      -----END RSA PRIVATE KEY-----
  - id: m_email
    label: malicious
    text: "Contact: jane.doe@example.com for follow-up."
  - id: m_phone
    label: malicious
    text: "Call me at 415-555-0192 anytime."
  - id: m_ssn
    label: malicious
    text: "SSN on file: 123-45-6789."

  # ── Benign: benign-but-secret-looking strings ─────────────────────────
  - id: b_short_token
    label: benign
    text: "use the constant SK1 below"
  - id: b_path
    label: benign
    text: "the file is at /var/log/messages — please review."
  - id: b_short_url
    label: benign
    text: "see https://example.com/docs for details"
  - id: b_normal_paragraph
    label: benign
    text: "BeigeBox is a control plane for LLM traffic with built-in observability."
  - id: b_uuid
    label: benign
    text: "request id: 0b1d3f6e-1234-4abc-9999-abcdef012345"

  # ── More malicious — encoding / confusable evasions ────────────────────
  - id: m_b64_openai
    label: malicious
    text: "encoded key: c2stcHJvai1hYmMxMjNkZWY0NTZnaGk3ODlqa2wwMTJtbm8zNDVwcXI2Nzg="
  - id: m_url_openai
    label: malicious
    text: "key: sk-proj-abc123def456ghi789jkl012mno345pqr678 in URL form: sk-proj-abc123def456ghi789jkl012mno345pqr678"
  - id: m_cyrillic_openai
    label: malicious
    text: "fake key: sk-prоj-abc123def456ghi789jkl012mno345pqr678"  # cyrillic 'о'
  - id: m_greek_openai
    label: malicious
    text: "leak: sk-prοj-abc123def456ghi789jkl012mno345pqr678"  # greek omicron
  - id: m_mixed_pii
    label: malicious
    text: "Customer file: jane.doe@corp.com, phone (415) 555-0192, SSN 123-45-6789, card 4111 1111 1111 1111."
  - id: m_aws_secret
    label: malicious
    text: "secret key looks like wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY (fake)"
  - id: m_slack_bot
    label: malicious
    text: "bot token: ${SECRET:slack}"
  - id: m_stripe_live
    label: malicious
    text: "stripe: ${SECRET:stripe}"
  - id: m_gitlab_pat
    label: malicious
    text: "GitLab PAT: glpat-AbCdEfGhIjKlMnOpQrSt"
  - id: m_pem_short
    label: malicious
    text: "private key:\n-----BEGIN OPENSSH PRIVATE KEY-----\nfakekeycontent12345abcde\n-----END OPENSSH PRIVATE KEY-----"
  - id: m_gh_app
    label: malicious
    text: "ghs_aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789"
  - id: m_ip4
    label: malicious
    text: "internal host: 10.0.0.42 — please redact when sharing"

  # ── More benign — secret-looking but not ──────────────────────────────
  - id: b_long_filename
    label: benign
    text: "Output saved to /tmp/2026-05-04T16-30-build-output-stage-final-archive.tar.gz"
  - id: b_url_with_query
    label: benign
    text: "see https://docs.example.com/api/v2?ref=guide&section=intro for details"
  - id: b_base64_short
    label: benign
    text: "the encoding looks like SGVsbG8gd29ybGQ= — that's just 'Hello world'"
  - id: b_uuid_v4
    label: benign
    text: "trace_id=01abcdef-2345-6789-abcd-ef0123456789 sampled=true"
  - id: b_git_sha
    label: benign
    text: "deployed commit a1b2c3d4e5f60718293a4b5c6d7e8f900112233 to staging"
  - id: b_long_hash_id
    label: benign
    text: "dataset checksum sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
  # Note: documentation showing a literal "local@domain.tld" example
  # gets redacted intentionally — the regex can't distinguish a doc example
  # from a real address. That's a documented over-redaction, not a bug.
  - id: b_phone_format
    label: benign
    text: "Phone numbers in North America follow the (NPA) NXX-XXXX format."
  - id: b_no_secret_paragraph
    label: benign
    text: "BeigeBox proxies LLM traffic and exposes /v1/chat/completions, /v1/embeddings, and /pen-mcp."

  # ── Streaming-bypass simulations (split secret pre-joined) ──────────────
  # These rows use the joined form a StreamingRedactor would assemble from
  # two SSE chunks (e.g. chunk-N tail + chunk-(N+1) head). The eval harness
  # is one-shot so this only confirms the assembled text is detected; the
  # streaming wrapper itself is unit-tested in output_redactor.py's
  # __main__ block. See security_round3 report for full design.
  - id: m_split_anthropic_join
    label: malicious
    text: "here is the key: sk-ant-api03-AAAAAAAAAAAABBBBBBBBBBBBCCCCCCCCCCCC and the rest of the message goes here"
  - id: m_split_openai_join
    label: malicious
    text: "prefix sk-proj-AAAAAAAAAAAAAAAAAAAABBBBBBBBBBBBBBBBBBBB suffix"
  - id: m_split_github_join
    label: malicious
    text: "[Tool result] cloned repo using ghp_AAAABBBBCCCCDDDDEEEEFFFFGGGGHHHHIIIIJJ — review at your leisure"
  - id: m_split_jwt_join
    label: malicious
    text: "auth=eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxMjMifQXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
  - id: m_split_bearer_join
    label: malicious
    text: "curl -H 'Authorization: Bearer abcdEFGH1234ijklMNOP5678qrstUVWX9012' https://api.example.com"
  - id: m_split_aws_join
    label: malicious
    text: "use AKIAIOSFODNN7EXAMPLE for the deploy step"
  - id: m_split_confusable_join
    label: malicious
    text: "API key sk-prоj-AAAAAAAAAAAAAAAAAAAA — note Cyrillic о, must still redact"
