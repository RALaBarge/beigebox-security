# BeigeBox Configuration — Example (CPU-only, minimal setup)
#
# QUICKSTART:
#   1. Copy this file to config.yaml
#   2. Customize for your setup (GPU, backends, features)
#   3. For runtime overrides, use runtime_config.yaml (hot-reload, no restart)
#
# For the full annotated config reference, see d0cs/configuration.md

# ─────────────────────────────────────────────────────────────────────────────
# Features — Minimal defaults (extend as needed)
# ─────────────────────────────────────────────────────────────────────────────

features:
  backends: true                  # Multi-backend routing
  decision_llm: true              # Judge/routing LLM
  classifier: true                # Embedding classifier
  semantic_cache: false           # Semantic deduplication cache
  operator: true                  # LLM-driven tool use
  harness: true                   # Multi-agent orchestrator
  tools: true                     # Function calling
  cost_tracking: false            # Estimate token costs (enable if using APIs)
  conversation_replay: true       # Replay conversations from SQLite
  auto_summarization: false       # Compress long contexts
  system_context: false           # Inject system_context.md into every request
  wiretap: true                   # Log all requests/responses
  payload_log: false              # Log full payloads to payload.jsonl
  wasm: false                     # WASM transform pipeline
  guardrails: false               # Input/output content filtering
  amf_mesh: false                 # Service mesh advertisement
  voice: false                    # Speech-to-text + text-to-speech
  hooks: false                    # Custom middleware hooks

# ─────────────────────────────────────────────────────────────────────────────
# Server Configuration
# ─────────────────────────────────────────────────────────────────────────────

server:
  host: "0.0.0.0"
  port: 8001
  log_level: "INFO"
  log_conversations: true

# ─────────────────────────────────────────────────────────────────────────────
# Backend Configuration — Ollama (local inference)
# ─────────────────────────────────────────────────────────────────────────────

backend:
  default_model: "qwen3:4b"  # CPU-friendly default
  url: "http://${OLLAMA_HOST:-localhost}:11434"
  timeout: 120
  model_paths:
    - "/mnt/storage/models"        # Primary: fast storage
    - "${HOME}/.ollama/models"     # Fallback: user home

backends_enabled: true

backends:
  # Primary: Local Ollama (CPU-only by default)
  - provider: ollama
    name: ollama-local
    url: "http://${OLLAMA_HOST:-localhost}:11434"
    timeout: 120
    timeout_ms: 120000             # 2 min for slower models
    priority: 2
    max_retries: 2
    backoff_base: 1.5
    backoff_max: 10.0

# ─────────────────────────────────────────────────────────────────────────────
# Storage Configuration
# ─────────────────────────────────────────────────────────────────────────────

storage:
  type: sqlite
  path: ./data/beigebox.db
  vector_backend: postgres
  postgres:
    # PostgreSQL connection string for vector storage + semantic cache.
    # Supports all psycopg2 connection string formats:
    #   - Simple: postgresql://localhost/beigebox
    #   - With auth: postgresql://user:password@host:5432/beigebox
    #   - Environment variable: $DATABASE_URL
    #
    # The backend will auto-create the embeddings table and indexes on first run.
    # Requires pgvector extension (installed automatically if you have superuser).
    connection_string: postgresql://localhost/beigebox
    pool_size: 5  # Connection pool size for concurrent queries

# ─────────────────────────────────────────────────────────────────────────────
# Wiretap (Request/Response Logging)
# ─────────────────────────────────────────────────────────────────────────────

wiretap:
  enabled: true
  path: ./data/wire.jsonl
  max_lines: 100000
  rotation_enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# Models Registry
# ─────────────────────────────────────────────────────────────────────────────

models:
  default: "llama3.2:3b"
  profiles:
    routing: "llama3.2:3b"      # Decision LLM (fast, lightweight)
    agentic: "llama3.2:3b"      # Operator / tool use
    summary: "llama3.2:3b"      # Auto-summarization

# ─────────────────────────────────────────────────────────────────────────────
# Decision LLM (Intelligent Routing)
# ─────────────────────────────────────────────────────────────────────────────

decision_llm:
  enabled: true
  temperature: 0.2
  system_prompt: "You are a helpful routing assistant."

# ─────────────────────────────────────────────────────────────────────────────
# Operator (Agentic Tool Use)
# ─────────────────────────────────────────────────────────────────────────────

operator:
  enabled: true
  model: "qwen3:4b"
  tool_profiles:
    minimal:
      - web_search
      - calculator
      - datetime
    standard:
      - web_search
      - web_scraper
      - calculator
      - datetime
      - memory
      - cdp
    full:
      - web_search
      - web_scraper
      - calculator
      - datetime
      - memory
      - cdp
      - document_search
  model_tool_profiles: {}
  autonomous:
    enabled: false
    max_turns: 5
  max_iterations: 10
  timeout: 300
  run_timeout: 600
  allowed_tools: []
  shell:
    enabled: true
    shell_binary: "/usr/local/bin/bb"
    allowed_commands: []
    blocked_patterns:
      - "> /home"
      - ">> /home"
      - "> ~"
      - ">> ~"
      - "^rm "
      - "^sudo "
      - "dd "
      - "mkfs"

# ─────────────────────────────────────────────────────────────────────────────
# Harness Orchestrator (Multi-agent)
# ─────────────────────────────────────────────────────────────────────────────

harness:
  enabled: true
  ralph_enabled: false
  store_runs: true
  max_stored_runs: 1000

# ─────────────────────────────────────────────────────────────────────────────
# Tools (Function Calling)
# ─────────────────────────────────────────────────────────────────────────────

tools:
  enabled: true
  registry:
    - name: web_search
      description: "Search the web for current information"
      enabled: true
    - name: web_scraper
      description: "Scrape a webpage for content"
      enabled: true
    - name: calculator
      description: "Perform mathematical calculations"
      enabled: true
    - name: datetime_tool
      description: "Get current date/time in any timezone"
      enabled: true
    - name: system_info
      description: "Get system information and run shell commands"
      enabled: true
  cdp:
    enabled: true
    ws_url: ws://localhost:9222
    timeout: 10
  memory:
    enabled: true
    max_results: 3
    min_score: 0.3
  plugins:
    enabled: true
    path: ./plugins
  bluetruth:
    enabled: false                 # Requires bluTruth running (sudo blutruth serve)
    api_url: "http://localhost:8484"
    db_path: "~/.blutruth/events.db"
  network_audit:
    enabled: false                 # Local network discovery, port scan, CVE lookup (no root required)
    timeout: 1.0                   # TCP connect timeout per port in seconds
    concurrency: 200               # Max parallel TCP connections
    max_hosts: 256                 # Max hosts to scan per subnet sweep

# ─────────────────────────────────────────────────────────────────────────────
# Embedding & Classification
# ─────────────────────────────────────────────────────────────────────────────

embedding:
  model: "nomic-embed-text"
  backend: "ollama"

# ─────────────────────────────────────────────────────────────────────────────
# Embedding Poisoning Detection (RAG security)
# ─────────────────────────────────────────────────────────────────────────────

embedding_poisoning_detection:
  enabled: true
  sensitivity: 0.95         # 0.90-0.99: higher = more sensitive
  block_threshold: 0.8      # Block if confidence > this (high confidence poisoning)
  warn_threshold: 0.5       # Warn if confidence > this (suspicious embeddings)
  baseline_window: 1000     # Number of embeddings to maintain baseline
  min_norm: 0.1             # Minimum embedding vector magnitude (lower = suspicious)
  max_norm: 100.0           # Maximum embedding vector magnitude (higher = suspicious)

classifier:
  enabled: true
  centroid_rebuild_interval: 3600

# ─────────────────────────────────────────────────────────────────────────────
# Routing Pipeline
# ─────────────────────────────────────────────────────────────────────────────

routing:
  session_cache:
    ttl_seconds: 3600
  classifier:
    enabled: true
  semantic_cache:
    enabled: false
  decision_llm:
    enabled: true
    temperature: 0.2

# ─────────────────────────────────────────────────────────────────────────────
# Z-Commands (Special syntax like "z: code", "z: search")
# ─────────────────────────────────────────────────────────────────────────────

zcommands:
  enabled: true
  prefix: "z:"
  commands:
    - name: "search"
      description: "Search for information"
      route_to: "semantic_search"
    - name: "code"
      description: "Code generation and analysis"
      route_to: "operator"
    - name: "complex"
      description: "Complex reasoning task"
      route_to: "harness"

# ─────────────────────────────────────────────────────────────────────────────
# Authentication Configuration (OAuth2 SSO + API Keys)
# ─────────────────────────────────────────────────────────────────────────────

auth:
  # Static API key (for backwards compatibility — legacy mode)
  api_key: ""

  # Rate limit for dynamically-generated API keys (user-generated via web UI)
  # Static keys from config can have per-key limits; dynamic keys use this default
  dynamic_key_rate_limit_rpm: 100  # 100 requests per minute per key

  # OAuth2 web UI authentication (GitHub / Google)
  # Enable "mode: oauth" to gate the web UI behind OAuth login
  web_ui:
    mode: "none"  # "none" = open, "oauth" = require login
    providers:
      - name: github
        client_id: ""  # Get from https://github.com/settings/developers
        # client_secret from BB_GITHUB_CLIENT_SECRET env var or agentauth add github
        # allowed_orgs: ["your-org"]  # empty = any GitHub account can login

      # Alternative: Google OAuth (OIDC)
      # - name: google
      #   client_id: ""  # Get from Google Cloud Console
      #   # client_secret from BB_GOOGLE_CLIENT_SECRET env var or agentauth add google
      #   allowed_emails: ["user@example.com"]  # empty = any Google account

  # Named API keys (for programmatic access)
  # Each key can have model/endpoint ACLs and rate limits
  keys:
    # - name: "dev-client"
    #   allowed_models: ["qwen*", "llama*"]
    #   allowed_endpoints: ["/v1/chat/completions", "/v1/models"]
    #   rate_limit_rpm: 1000
    #
    # - name: "readonly-client"
    #   allowed_models: ["*"]
    #   allowed_endpoints: ["/v1/models", "/beigebox/stats"]
    #   rate_limit_rpm: 100

# ─────────────────────────────────────────────────────────────────────────────
# Web UI Configuration
# ─────────────────────────────────────────────────────────────────────────────

web_ui:
  palette: "dark"
  vi_mode: false
  voice_enabled: false

# ─────────────────────────────────────────────────────────────────────────────
# Voice (Speech-to-Text + Text-to-Speech)
# ─────────────────────────────────────────────────────────────────────────────
# Enable features.voice above, then set service URLs.
# Docker voice profile: whisper → :9000  kokoro → :8880
# From inside Docker, use http://host.docker.internal:<port>

voice:
  stt_url: ""            # e.g. http://localhost:9000  (or host.docker.internal in Docker)
  tts_url: ""            # e.g. http://localhost:8880
  tts_model: "kokoro"
  tts_voice: "af_bella"  # kokoro: af_bella af_sarah am_adam  openai: alloy echo fable
  tts_speed: 1.0
  tts_autoplay: false

# ─────────────────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────────────────

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/beigebox.log"
  max_bytes: 10485760
  backup_count: 5

# ─────────────────────────────────────────────────────────────────────────────
# Advanced Settings
# ─────────────────────────────────────────────────────────────────────────────

advanced:
  session_cache_ttl: 3600
  max_concurrent_requests: 10
  request_timeout: 300
  embedding_batch_size: 32
  wiretap_compress: false
