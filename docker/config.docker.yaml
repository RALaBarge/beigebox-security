# beigebox config — Docker deployment (Phase-2 schema)
# Uses container service names for networking.
# For bare-metal, use config.yaml instead.

# ─────────────────────────────────────────────────────────────────────────────
# Features — Centralized Master Control (Phase 1)
# ─────────────────────────────────────────────────────────────────────────────
features:
  backends: true                  # Multi-backend routing
  decision_llm: true              # Judge/routing LLM
  classifier: true                # Embedding classifier
  semantic_cache: true            # Semantic deduplication cache
  operator: true                  # LLM-driven tool use
  harness: true                   # Multi-agent orchestrator
  tools: true                     # Function calling
  cost_tracking: true             # Estimate token costs
  conversation_replay: true
  auto_summarization: false
  system_context: false
  wiretap: true
  wasm: true                      # WASM transform pipeline (opener_strip etc.)
  guardrails: false
  amf_mesh: false                 # Disabled in Docker (no mDNS in containers)
  voice: false                    # Set true only if whisper/kokoro containers running
  hooks: false

# ─────────────────────────────────────────────────────────────────────────────
# Backend (where requests get forwarded)
# ─────────────────────────────────────────────────────────────────────────────
backend:
  url: "http://ollama:11434"            # Docker service name
  default_model: "qwen3:4b"             # Main chat model — pulled by ollama-init
  timeout: 120

backends_enabled: true
backends:
  - provider: ollama
    name: ollama-local
    url: "http://ollama:11434"
    timeout: 120
    timeout_ms: 120000
    priority: 1
    max_retries: 2
    backoff_base: 1.5
    backoff_max: 10.0

# ─────────────────────────────────────────────────────────────────────────────
# Middleware Server
# ─────────────────────────────────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8000

# ─────────────────────────────────────────────────────────────────────────────
# Models Registry — Phase 2 unified allocation
# ─────────────────────────────────────────────────────────────────────────────
models:
  default: "qwen3:4b"
  profiles:
    routing: "llama3.2:3b"          # Decision LLM / judge — no thinking mode, faster than qwen3
    agentic: "qwen3:4b"             # Operator / tool use
    summary: "qwen3:4b"             # Auto-summarization
  per_task:
    pre_hook: null
    post_hook: null
    reflection: null
    context_pruning: null
  whitelist:
    enabled: false
    allowed_models: []

# ─────────────────────────────────────────────────────────────────────────────
# Storage — Phase 2 keys
# ─────────────────────────────────────────────────────────────────────────────
storage:
  type: sqlite
  path: ./data/beigebox.db
  vector_store_path: ./data/chroma
  vector_backend: chromadb
  log_conversations: true

# ─────────────────────────────────────────────────────────────────────────────
# Embedding — Phase 2 structure
# ─────────────────────────────────────────────────────────────────────────────
embedding:
  model: "nomic-embed-text"
  backend: "ollama"

classifier:
  enabled: true
  centroid_rebuild_interval: 3600

# ─────────────────────────────────────────────────────────────────────────────
# Semantic Cache
# ─────────────────────────────────────────────────────────────────────────────
semantic_cache:
  enabled: true
  similarity_threshold: 0.92
  max_entries: 500
  ttl_seconds: 3600

# ─────────────────────────────────────────────────────────────────────────────
# Tools (Function Calling) — Phase 2 list-form registry
# ─────────────────────────────────────────────────────────────────────────────
tools:
  enabled: true
  webhook_url: ""
  registry:
    - name: web_search
      description: "Search the web for current information"
      enabled: true
      provider: "duckduckgo"
      max_results: 5
    - name: web_scraper
      description: "Scrape a webpage for content"
      enabled: true
      max_content_length: 10000
    - name: calculator
      description: "Perform mathematical calculations"
      enabled: true
    - name: datetime_tool
      description: "Get current date/time in any timezone"
      enabled: true
      local_tz_offset: -5.0
    - name: system_info
      description: "Get system information"
      enabled: true
    - name: google_search
      description: "Google Custom Search"
      enabled: false
      api_key: "${GOOGLE_API_KEY}"
      cse_id: "${GOOGLE_CSE_ID}"

  memory:
    enabled: true
    max_results: 3
    min_score: 0.3

  browserbox:
    enabled: true
    ws_url: ws://host.docker.internal:9009   # relay running on host
    timeout: 10

  cdp:
    enabled: false
    ws_url: ws://host.docker.internal:9222
    timeout: 10

  ensemble:
    enabled: false
    judge_model: ""
    max_models: 6

  plugins:
    enabled: true
    path: ./plugins
    repo:
      enabled: true
    zip_inspector:
      enabled: true
    doc_parser:
      enabled: true
      max_ref_tokens: 4000
      chunk_size: 800
      chunk_overlap: 80

# ─────────────────────────────────────────────────────────────────────────────
# Decision LLM — references models.profiles.routing
# ─────────────────────────────────────────────────────────────────────────────
decision_llm:
  enabled: true
  # model is sourced from models.profiles.routing (llama3.2:3b) in Phase-2 loader.
  # Kept here for back-compat with any code path still reading decision_llm.model.
  model: "llama3.2:3b"
  backend_url: "http://ollama:11434"
  timeout: 15
  temperature: 0.2
  max_tokens: 256
  system_prompt: "You are a helpful routing assistant that decides which tool or backend to use."
  routes:
    default:
      model: "qwen3:4b"
      description: "General purpose conversation and Q&A"
      wasm_module: "opener_strip"
    code:
      model: "qwen3:4b"
      description: "Code generation, debugging, technical programming tasks"
      # no wasm_module — code responses should not be stripped
    large:
      model: "qwen3:4b"
      description: "Complex reasoning, analysis, long-form writing"
      wasm_module: "opener_strip"
    fast:
      model: "qwen3:4b"
      description: "Quick responses, simple questions, brainstorming"
      wasm_module: "opener_strip"

# ─────────────────────────────────────────────────────────────────────────────
# Routing — explicit tier pipeline
# ─────────────────────────────────────────────────────────────────────────────
routing:
  session_cache:
    ttl_seconds: 3600
    max_entries: 1000          # Hard cap on session cache size
    trim_to: 800               # Shrink to this after hitting max
    evict_every_writes: 100    # Eviction sweep frequency
  classifier:
    enabled: true
    centroid_rebuild_interval: 3600
  semantic_cache:
    enabled: true
    similarity_threshold: 0.92
    max_entries: 500
    ttl_seconds: 3600
  decision_llm:
    enabled: true
    temperature: 0.2

# ─────────────────────────────────────────────────────────────────────────────
# Harness
# ─────────────────────────────────────────────────────────────────────────────
harness:
  enabled: true
  ralph_enabled: false
  retry:
    max_retries: 2
    backoff_base: 1.5
    backoff_max: 10
  stagger:
    operator_seconds: 1.0
    model_seconds: 0.4
  timeouts:
    task_seconds: 120
    operator_seconds: 180
  store_runs: true
  max_stored_runs: 1000

# ─────────────────────────────────────────────────────────────────────────────
# Operator
# ─────────────────────────────────────────────────────────────────────────────
operator:
  enabled: true
  model: "qwen3:4b"
  max_iterations: 10
  timeout: 300
  run_timeout: 600
  allowed_tools: []
  browser_meta_tool: false
  tool_profiles:
    minimal:
      - web_search
      - calculator
      - datetime_tool
    standard:
      - web_search
      - web_scraper
      - calculator
      - datetime_tool
      - memory
    full:
      - web_search
      - web_scraper
      - calculator
      - datetime_tool
      - memory
      - system_info
  model_tool_profiles: {}
  autonomous:
    enabled: false
    max_turns: 5
  context_pruning:
    enabled: false
    model: ""
    timeout: 8
  reflection:
    enabled: false
    model: ""
    timeout: 20
  pre_hook:
    enabled: false
    model: "qwen3:4b"
    max_iterations: 3
  post_hook:
    enabled: false
    model: "qwen3:4b"
    max_iterations: 3
  shell:
    enabled: true
    # All shell commands are routed through /usr/local/bin/bb (restricted busybox).
    shell_binary: "/usr/local/bin/bb"
    allowed_commands:
      - ls
      - cat
      - grep
      - ps
      - df
      - free
      - du
      - uptime
      - uname
      - env
      - printenv
      - whoami
      - id
      - hostname
      - date
    blocked_patterns:
      - "rm"
      - "chmod"
      - "chown"
      - "chroot"
      - "mv"
      - "cp"
      - "> "
      - ">>"
      - "sudo"
      - "su "
      - "| sh"
      - "| bash"
      - "| ash"
      - "$()"
      - "`"
  data:
    sqlite_queries:
      recent_conversations: >
        SELECT c.id, c.created_at, COUNT(m.id) as msg_count
        FROM conversations c JOIN messages m ON m.conversation_id = c.id
        GROUP BY c.id ORDER BY c.created_at DESC LIMIT 10
      token_usage_by_model: >
        SELECT model, SUM(token_count) as tokens, COUNT(*) as messages
        FROM messages GROUP BY model ORDER BY tokens DESC
      search_messages: >
        SELECT role, content, model, timestamp FROM messages
        WHERE content LIKE ? ORDER BY timestamp DESC LIMIT 20
      todays_conversations: >
        SELECT c.id, c.created_at, COUNT(m.id) as msg_count
        FROM conversations c JOIN messages m ON m.conversation_id = c.id
        WHERE date(c.created_at) = date('now')
        GROUP BY c.id ORDER BY c.created_at DESC

# ─────────────────────────────────────────────────────────────────────────────
# Cost Tracking
# ─────────────────────────────────────────────────────────────────────────────
cost_tracking:
  enabled: true
  track_openrouter: true
  track_local: false

conversation_replay:
  enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# Hooks
# ─────────────────────────────────────────────────────────────────────────────
hooks:
  enabled: false
  directory: "./hooks"

# ─────────────────────────────────────────────────────────────────────────────
# Advanced
# ─────────────────────────────────────────────────────────────────────────────
advanced:
  stream_stall_timeout_seconds: 120
  session_cache_ttl: 3600
  max_concurrent_requests: 10
  request_timeout: 300
  embedding_batch_size: 32
  embedding_timeout_seconds: 5.0         # Timeout for embedding API calls (classifier, semantic cache)
  wiretap_compress: false
  runtime_config_check_interval: 1.0     # How often to check mtime on runtime_config.yaml
  mcp:
    max_request_bytes: 1000000           # Max size of MCP tool call inputs (1 MB)
  backends:
    latency_window_size: 100             # Number of samples to track for P95 latency per backend

# ─────────────────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────────────────
logging:
  level: "DEBUG"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/app/logs/beigebox.log"
  max_bytes: 10485760
  backup_count: 5

# ─────────────────────────────────────────────────────────────────────────────
# Wiretap
# ─────────────────────────────────────────────────────────────────────────────
wiretap:
  enabled: true
  path: "./data/wire.jsonl"
  max_lines: 100000
  rotation_enabled: true

payload_log:
  path: ./data/payload.jsonl

# ─────────────────────────────────────────────────────────────────────────────
# Auto-summarization
# ─────────────────────────────────────────────────────────────────────────────
auto_summarization:
  enabled: false
  token_budget: 3000
  summary_model: "qwen3:4b"
  keep_last: 4
  summary_prefix: "Summary of earlier conversation: "

# ─────────────────────────────────────────────────────────────────────────────
# System Context
# ─────────────────────────────────────────────────────────────────────────────
system_context:
  enabled: false
  path: ./data/system_context.md

# ─────────────────────────────────────────────────────────────────────────────
# WASM Transform Pipeline
# ─────────────────────────────────────────────────────────────────────────────
wasm:
  enabled: true
  timeout_ms: 5000
  default_module: ""
  modules:
    pdf_oxide:
      enabled: true
      path: "/app/wasm_modules/pdf_oxide/pdf-oxide-wasi.wasm"
      description: "Extract text/markdown from PDF files (pdf_oxide 0.3)"
    passthrough:
      enabled: false
      path: "/app/wasm_modules/passthrough/target/wasm32-wasip1/release/passthrough.wasm"
      description: "Identity transform — for testing"
    json_extractor:
      enabled: false
      path: "/app/wasm_modules/json_extractor/target/wasm32-wasip1/release/json_extractor.wasm"
      description: "Extract JSON objects from freeform text"
    markdown_stripper:
      enabled: false
      path: "/app/wasm_modules/markdown_stripper/target/wasm32-wasip1/release/markdown_stripper.wasm"
      description: "Strip markdown formatting to plain text"
    opener_strip:
      enabled: true     # REQUIRED: decision_llm.routes reference this module
      path: "/app/wasm_modules/opener_strip/target/wasm32-wasip1/release/opener_strip.wasm"
      description: "Strip verbose opening phrases from responses"
    pii_redactor:
      enabled: false
      path: "/app/wasm_modules/pii_redactor/target/wasm32-wasip1/release/pii_redactor.wasm"
      description: "Redact PII (emails, phone numbers, SSNs) from text"

# ─────────────────────────────────────────────────────────────────────────────
# Voice
# ─────────────────────────────────────────────────────────────────────────────
voice:
  enabled: false
  stt_url: "http://whisper:8000"
  tts_url: "http://kokoro:8880"
  tts_voice: "af_heart"
  tts_model: "kokoro"
  tts_speed: 1.0
  tts_autoplay: false
  hotkey: ""

# ─────────────────────────────────────────────────────────────────────────────
# AMF Mesh — disabled in Docker (no mDNS across container boundaries)
# ─────────────────────────────────────────────────────────────────────────────
amf_mesh:
  enabled: false
  instance_name: "beigebox"
  host: "localhost"
  port: null
  trust_domain: "local"
  nats_url: ""
